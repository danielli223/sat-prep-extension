<svg xmlns="http://www.w3.org/2000/svg" width="940" height="470" viewBox="0 0 940 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="940" height="470" fill="#ffffff"/>
  <text x="32" y="38" font-size="20" font-weight="700" fill="#0f172a">In-page calculator: floating box → docked to the side</text>
  <text x="32" y="60" font-size="13" fill="#64748b">The "Calculator" button now mounts a full-height panel docked to the screen edge, like College Board's Math UI (issue #37).</text>

  <!-- ============ BEFORE ============ -->
  <g transform="translate(32,86)">
    <rect x="0" y="0" width="416" height="330" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <rect x="0" y="0" width="416" height="30" rx="10" fill="#f1f5f9"/>
    <rect x="0" y="18" width="416" height="12" fill="#f1f5f9"/>
    <circle cx="16" cy="15" r="4" fill="#fca5a5"/><circle cx="30" cy="15" r="4" fill="#fde68a"/><circle cx="44" cy="15" r="4" fill="#86efac"/>
    <text x="70" y="19" font-size="10" fill="#94a3b8">College Board Question Bank · Math</text>
    <!-- page -->
    <rect x="1" y="30" width="414" height="299" fill="#eef2f7"/>
    <!-- CB question content bars -->
    <g fill="#cbd5e1">
      <rect x="28" y="52" width="300" height="11" rx="5"/>
      <rect x="28" y="72" width="356" height="11" rx="5"/>
      <rect x="28" y="92" width="250" height="11" rx="5"/>
    </g>
    <g fill="#dbe3ec">
      <rect x="28" y="120" width="356" height="26" rx="6"/>
      <rect x="28" y="152" width="356" height="26" rx="6"/>
      <rect x="28" y="184" width="356" height="26" rx="6"/>
    </g>
    <!-- floating calculator box bottom-left -->
    <g transform="translate(20,150)" filter="url(#sh)">
      <rect x="0" y="0" width="150" height="160" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="0" y="0" width="150" height="26" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="12" y="17" font-size="9" font-weight="700" letter-spacing="1" fill="#475569">CALCULATOR</text>
      <rect x="124" y="5" width="18" height="16" rx="5" fill="#f1f5f9"/><text x="129" y="17" font-size="9" fill="#475569">✕</text>
      <!-- keypad -->
      <g>
        <rect x="10" y="34" width="130" height="44" rx="6" fill="#0b1f33"/>
        <text x="128" y="62" font-size="13" fill="#7dd3fc" text-anchor="end">x²+3x−40</text>
      </g>
      <g fill="#f1f5f9" stroke="#e2e8f0">
        <rect x="10" y="86" width="28" height="20" rx="4"/><rect x="44" y="86" width="28" height="20" rx="4"/><rect x="78" y="86" width="28" height="20" rx="4"/><rect x="112" y="86" width="28" height="20" rx="4"/>
        <rect x="10" y="112" width="28" height="20" rx="4"/><rect x="44" y="112" width="28" height="20" rx="4"/><rect x="78" y="112" width="28" height="20" rx="4"/><rect x="112" y="112" width="28" height="20" rx="4"/>
        <rect x="10" y="138" width="28" height="16" rx="4"/><rect x="44" y="138" width="28" height="16" rx="4"/><rect x="78" y="138" width="28" height="16" rx="4"/><rect x="112" y="138" width="28" height="16" rx="4"/>
      </g>
    </g>
    <rect x="156" y="305" width="6" height="6" fill="none"/>
  </g>
  <text x="32" y="438" font-size="13" font-weight="700" fill="#b45309">Before</text>
  <text x="86" y="438" font-size="13" fill="#64748b">— floating box pinned bottom-left, detached from the page</text>

  <!-- ============ AFTER ============ -->
  <g transform="translate(492,86)">
    <rect x="0" y="0" width="416" height="330" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#sh)"/>
    <rect x="0" y="0" width="416" height="30" rx="10" fill="#f1f5f9"/>
    <rect x="0" y="18" width="416" height="12" fill="#f1f5f9"/>
    <circle cx="16" cy="15" r="4" fill="#fca5a5"/><circle cx="30" cy="15" r="4" fill="#fde68a"/><circle cx="44" cy="15" r="4" fill="#86efac"/>
    <text x="70" y="19" font-size="10" fill="#94a3b8">College Board Question Bank · Math</text>
    <rect x="1" y="30" width="414" height="299" fill="#eef2f7"/>
    <!-- CB content shifted right -->
    <g fill="#cbd5e1">
      <rect x="190" y="52" width="196" height="11" rx="5"/>
      <rect x="190" y="72" width="196" height="11" rx="5"/>
      <rect x="190" y="92" width="150" height="11" rx="5"/>
    </g>
    <g fill="#dbe3ec">
      <rect x="190" y="120" width="196" height="26" rx="6"/>
      <rect x="190" y="152" width="196" height="26" rx="6"/>
      <rect x="190" y="184" width="196" height="26" rx="6"/>
      <rect x="190" y="216" width="196" height="26" rx="6"/>
    </g>
    <!-- docked full-height calculator on the LEFT -->
    <g transform="translate(1,30)">
      <rect x="0" y="0" width="168" height="299" rx="0" fill="#ffffff" stroke="#cbd5e1"/>
      <path d="M0 0 H162 a6 6 0 0 1 6 6 V293 a6 6 0 0 1 -6 6 H0 Z" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="0" y="0" width="168" height="28" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="14" y="18" font-size="9" font-weight="700" letter-spacing="1" fill="#475569">CALCULATOR</text>
      <rect x="142" y="5" width="18" height="18" rx="5" fill="#f1f5f9"/><text x="147" y="18" font-size="9" fill="#475569">✕</text>
      <!-- expression display -->
      <rect x="12" y="38" width="144" height="46" rx="6" fill="#0b1f33"/>
      <text x="146" y="67" font-size="13" fill="#7dd3fc" text-anchor="end">x²+3x−40</text>
      <!-- big keypad filling height -->
      <g fill="#f1f5f9" stroke="#e2e8f0">
        <rect x="12" y="96" width="33" height="26" rx="5"/><rect x="49" y="96" width="33" height="26" rx="5"/><rect x="86" y="96" width="33" height="26" rx="5"/><rect x="123" y="96" width="33" height="26" rx="5"/>
        <rect x="12" y="128" width="33" height="26" rx="5"/><rect x="49" y="128" width="33" height="26" rx="5"/><rect x="86" y="128" width="33" height="26" rx="5"/><rect x="123" y="128" width="33" height="26" rx="5"/>
        <rect x="12" y="160" width="33" height="26" rx="5"/><rect x="49" y="160" width="33" height="26" rx="5"/><rect x="86" y="160" width="33" height="26" rx="5"/><rect x="123" y="160" width="33" height="26" rx="5"/>
        <rect x="12" y="192" width="33" height="26" rx="5"/><rect x="49" y="192" width="33" height="26" rx="5"/><rect x="86" y="192" width="33" height="26" rx="5"/><rect x="123" y="192" width="33" height="26" rx="5"/>
        <rect x="12" y="224" width="33" height="26" rx="5"/><rect x="49" y="224" width="33" height="26" rx="5"/><rect x="86" y="224" width="33" height="26" rx="5"/>
      </g>
      <rect x="123" y="224" width="33" height="58" rx="5" fill="#3b82f6"/><text x="139" y="258" font-size="13" fill="#fff" text-anchor="middle">=</text>
      <g fill="#f1f5f9" stroke="#e2e8f0">
        <rect x="12" y="256" width="33" height="26" rx="5"/><rect x="49" y="256" width="33" height="26" rx="5"/><rect x="86" y="256" width="33" height="26" rx="5"/>
      </g>
    </g>
  </g>
  <text x="492" y="438" font-size="13" font-weight="700" fill="#15803d">After</text>
  <text x="540" y="438" font-size="13" fill="#64748b">— full-height panel docked to the side (left edge), like the test-day UI</text>
</svg>
