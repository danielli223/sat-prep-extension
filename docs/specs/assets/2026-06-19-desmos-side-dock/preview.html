<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Issue #37 — calculator docked to the side (preview)</title>
<!--
  Self-contained preview of the issue-#37 change. The `.fp-geogebra*` rules below are copied VERBATIM
  from extension/src/ui/host.ts and the `.fp-*` answer rules from extension/src/ui/answer-overlay.ts,
  so the layout/positioning here is exactly what ships. The calculator body is a static keypad mock —
  at runtime the real GeoGebra app loads from geogebra.org inside the docked panel's <iframe>.
  Open this file in any browser to see the docked-to-the-side layout.
-->
<style>
  html,body{margin:0;height:100%;background:#f3f4f6;
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#1f2937;}
  /* faux College Board Math header, for context only */
  .cb-top{position:fixed;top:0;left:0;right:0;height:52px;background:#fff;border-bottom:1px solid #e5e7eb;
    display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:0;}
  .cb-top b{font-size:15px;color:#0f172a;}
  .cb-top .t{font-size:15px;color:#334155;}
  .cb-question{position:fixed;top:92px;right:40px;width:520px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;
    box-shadow:0 12px 40px rgba(0,0,0,.12);padding:22px;z-index:0;}
  .cb-stem{font-size:16px;color:#0f172a;margin-bottom:6px;}

  /* ===== copied from host.ts (BASE_CSS) — the side-docked calculator panel ===== */
  .fp-geogebra{position:fixed;left:0;top:0;width:440px;max-width:92vw;height:100vh;
    border:1px solid #cbd5e1;border-left:0;border-radius:0 14px 14px 0;box-shadow:14px 0 50px rgba(0,0,0,.28);background:#fff;
    display:flex;flex-direction:column;overflow:hidden;}
  .fp-geogebra-head{display:flex;justify-content:space-between;align-items:center;flex:none;padding:6px 6px 6px 12px;
    border-bottom:1px solid #e5e7eb;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#475569;}
  .fp-geogebra-close{flex:none;border:none;background:#f1f5f9;color:#475569;border-radius:8px;width:26px;height:26px;cursor:pointer;font-size:12px;line-height:1;}
  .fp-geogebra-frame{flex:1;width:100%;border:0;}

  /* calculator-body mock (stands in for the geogebra.org iframe) */
  .calc-mock{flex:1;display:flex;flex-direction:column;padding:14px;gap:12px;background:#fff;}
  .calc-screen{background:#0b1f33;color:#7dd3fc;border-radius:8px;padding:14px 16px;text-align:right;font-size:22px;min-height:48px;}
  .calc-pad{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex:1;}
  .calc-pad button{border:1px solid #e2e8f0;background:#f1f5f9;border-radius:8px;font-size:16px;cursor:pointer;}
  .calc-pad button.op{background:#e2e8f0;}
  .calc-pad button.eq{background:#3b82f6;color:#fff;border-color:#3b82f6;}
  .calc-note{font-size:10px;color:#94a3b8;text-align:center;}

  /* ===== copied from answer-overlay.ts (ANSWER_CSS) — the interaction overlay ===== */
  .fp-answer{font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#1f2937;}
  .fp-progress{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:#6b7280;border-bottom:1px solid #eee;padding-bottom:8px;margin-bottom:12px;}
  .fp-choices{list-style:none;margin:0 0 12px;padding:0;}
  .fp-choice{display:flex;align-items:center;border:1px solid #e5e7eb;border-radius:9px;margin-bottom:7px;}
  .fp-choice .fp-eliminate{border:none;background:transparent;color:#9ca3af;cursor:pointer;font-size:14px;padding:8px 4px 8px 10px;}
  .fp-choice .fp-pick{flex:1;display:flex;align-items:center;text-align:left;border:none;background:transparent;cursor:pointer;padding:9px 12px 9px 2px;color:inherit;font:inherit;}
  .fp-choice .fp-letter{font-weight:700;margin-right:8px;}
  .fp-choice.fp-selected{border:2px solid #3b82f6;background:#eff6ff;}
  .fp-actions{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
  .fp-check{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer;font:inherit;}
  .fp-reveal{background:#f1f5f9;color:#334155;border:none;border-radius:8px;padding:9px 14px;cursor:pointer;font:inherit;}
  .fp-next{margin-left:auto;background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;font:inherit;}
  .fp-calc{display:flex;gap:8px;margin-top:8px;}
  .fp-calc-pin,.fp-desmos{background:#f1f5f9;color:#334155;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font:inherit;font-size:12px;}
  .fp-desmos{border:1px solid #3b82f6;color:#1d4ed8;background:#eff6ff;}
</style>
</head>
<body>
  <header class="cb-top"><b>Section 2, Module 1: Math</b><span class="t">16:51</span></header>

  <!-- faux CB question (CB renders this natively; shown for context) -->
  <section class="cb-question">
    <div class="cb-stem">Which expression is equivalent to <i>x² + 3x − 40</i>?</div>
    <div class="fp-answer">
      <div class="fp-progress"><span>Algebra › Hard</span><span>Q 2 of 22</span></div>
      <ul class="fp-choices">
        <li class="fp-choice"><button class="fp-eliminate">⊘</button><button class="fp-pick"><span class="fp-letter">A</span> (x − 4)(x + 10)</button></li>
        <li class="fp-choice fp-selected"><button class="fp-eliminate">⊘</button><button class="fp-pick"><span class="fp-letter">B</span> (x − 5)(x + 8)</button></li>
        <li class="fp-choice"><button class="fp-eliminate">⊘</button><button class="fp-pick"><span class="fp-letter">C</span> (x − 8)(x + 5)</button></li>
        <li class="fp-choice"><button class="fp-eliminate">⊘</button><button class="fp-pick"><span class="fp-letter">D</span> (x − 10)(x + 4)</button></li>
      </ul>
      <div class="fp-actions"><button class="fp-check">Check</button><button class="fp-reveal">Reveal explanation</button><button class="fp-next">Next</button></div>
      <div class="fp-calc"><button class="fp-calc-pin">Calculator</button><button class="fp-desmos">Open real Desmos</button></div>
    </div>
  </section>

  <!-- the docked calculator panel (real shipped CSS; body is a mock of the GeoGebra iframe) -->
  <aside class="fp-geogebra">
    <div class="fp-geogebra-head"><span>Calculator</span><button class="fp-geogebra-close">✕</button></div>
    <div class="calc-mock">
      <div class="calc-screen">x²+3x−40</div>
      <div class="calc-pad">
        <button>x</button><button>y</button><button>x²</button><button class="op">÷</button>
        <button>7</button><button>8</button><button>9</button><button class="op">×</button>
        <button>4</button><button>5</button><button>6</button><button class="op">−</button>
        <button>1</button><button>2</button><button>3</button><button class="op">+</button>
        <button>0</button><button>.</button><button>√</button><button class="eq">=</button>
      </div>
      <div class="calc-note">GeoGebra scientific calculator — loads from geogebra.org at runtime</div>
    </div>
  </aside>
</body>
</html>
