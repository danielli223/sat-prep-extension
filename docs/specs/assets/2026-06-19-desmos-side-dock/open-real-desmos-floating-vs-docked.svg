<svg xmlns="http://www.w3.org/2000/svg" width="940" height="470" viewBox="0 0 940 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <filter id="sh2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="940" height="470" fill="#ffffff"/>
  <text x="32" y="38" font-size="20" font-weight="700" fill="#0f172a">"Open real Desmos" → opens docked to the side of the screen</text>
  <text x="32" y="60" font-size="13" fill="#64748b">Still desmos.com's own free site in its own window (never an iframe) — now anchored to the screen edge instead of floating.</text>

  <!-- ============ BEFORE ============ -->
  <g transform="translate(32,86)">
    <rect x="0" y="0" width="416" height="320" rx="8" fill="#dfe6ee" stroke="#cbd5e1"/>
    <!-- main browser window -->
    <g transform="translate(18,16)" filter="url(#sh2)">
      <rect x="0" y="0" width="300" height="288" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <rect x="0" y="0" width="300" height="24" rx="8" fill="#f1f5f9"/><rect x="0" y="14" width="300" height="10" fill="#f1f5f9"/>
      <circle cx="13" cy="12" r="3.5" fill="#fca5a5"/><circle cx="25" cy="12" r="3.5" fill="#fde68a"/><circle cx="37" cy="12" r="3.5" fill="#86efac"/>
      <text x="58" y="15" font-size="9" fill="#94a3b8">College Board Question Bank · Math</text>
      <g fill="#cbd5e1"><rect x="20" y="44" width="220" height="9" rx="4"/><rect x="20" y="60" width="180" height="9" rx="4"/></g>
      <g fill="#dbe3ec"><rect x="20" y="84" width="260" height="20" rx="5"/><rect x="20" y="110" width="260" height="20" rx="5"/></g>
      <!-- Open real Desmos button highlighted -->
      <rect x="20" y="244" width="120" height="26" rx="7" fill="#eff6ff" stroke="#3b82f6"/>
      <text x="80" y="261" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Open real Desmos</text>
    </g>
    <!-- floating Desmos window, centered & overlapping -->
    <g transform="translate(150,70)" filter="url(#sh2)">
      <rect x="0" y="0" width="210" height="180" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="0" y="0" width="210" height="22" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="10" y="15" font-size="9" font-weight="700" fill="#475569">Desmos · Graphing Calculator</text>
      <!-- expr strip -->
      <rect x="0" y="22" width="62" height="158" fill="#fafafa" stroke="#eee"/>
      <rect x="6" y="30" width="14" height="14" rx="3" fill="#c74440"/>
      <text x="26" y="41" font-size="8" fill="#334155">x²+3x−40</text>
      <!-- graph -->
      <line x1="62" y1="101" x2="210" y2="101" stroke="#e5e7eb"/><line x1="136" y1="22" x2="136" y2="180" stroke="#e5e7eb"/>
      <path d="M104 30 Q136 150 168 30" fill="none" stroke="#c74440" stroke-width="2.5"/>
    </g>
  </g>
  <text x="32" y="430" font-size="13" font-weight="700" fill="#b45309">Before</text>
  <text x="86" y="430" font-size="13" fill="#64748b">— a default window floating over the page</text>

  <!-- ============ AFTER ============ -->
  <g transform="translate(492,86)">
    <rect x="0" y="0" width="416" height="320" rx="8" fill="#dfe6ee" stroke="#cbd5e1"/>
    <!-- main browser window, left -->
    <g transform="translate(16,18)" filter="url(#sh2)">
      <rect x="0" y="0" width="232" height="284" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <rect x="0" y="0" width="232" height="24" rx="8" fill="#f1f5f9"/><rect x="0" y="14" width="232" height="10" fill="#f1f5f9"/>
      <circle cx="13" cy="12" r="3.5" fill="#fca5a5"/><circle cx="25" cy="12" r="3.5" fill="#fde68a"/><circle cx="37" cy="12" r="3.5" fill="#86efac"/>
      <text x="58" y="15" font-size="9" fill="#94a3b8">Question Bank · Math</text>
      <g fill="#cbd5e1"><rect x="20" y="44" width="180" height="9" rx="4"/><rect x="20" y="60" width="150" height="9" rx="4"/></g>
      <g fill="#dbe3ec"><rect x="20" y="84" width="192" height="20" rx="5"/><rect x="20" y="110" width="192" height="20" rx="5"/></g>
      <rect x="20" y="244" width="120" height="26" rx="7" fill="#eff6ff" stroke="#3b82f6"/>
      <text x="80" y="261" font-size="10" font-weight="600" fill="#1d4ed8" text-anchor="middle">Open real Desmos</text>
    </g>
    <!-- Desmos window docked flush to the RIGHT edge, full height -->
    <g transform="translate(280,0)" filter="url(#sh2)">
      <rect x="0" y="0" width="136" height="320" rx="0" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="0" y="0" width="136" height="22" fill="#ffffff" stroke="#e5e7eb"/>
      <text x="9" y="15" font-size="8.5" font-weight="700" fill="#475569">Desmos · Graphing</text>
      <rect x="0" y="22" width="48" height="298" fill="#fafafa" stroke="#eee"/>
      <rect x="6" y="30" width="12" height="12" rx="3" fill="#c74440"/>
      <text x="24" y="40" font-size="7.5" fill="#334155">x²+3x−40</text>
      <rect x="6" y="50" width="12" height="12" rx="3" fill="#2d70b3"/>
      <line x1="48" y1="180" x2="136" y2="180" stroke="#e5e7eb"/><line x1="92" y1="22" x2="92" y2="320" stroke="#e5e7eb"/>
      <path d="M64 40 Q92 290 120 40" fill="none" stroke="#c74440" stroke-width="2.5"/>
    </g>
    <!-- arrow showing it's flush to the edge -->
    <path d="M418 160 l-10 -7 v14 z" fill="#15803d"/>
  </g>
  <text x="492" y="430" font-size="13" font-weight="700" fill="#15803d">After</text>
  <text x="540" y="430" font-size="13" fill="#64748b">— a tall, narrow window flush to the screen's right edge</text>
</svg>
