name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Mutually exclusive with the Issue Loop. The loop "owns" any issue/PR carrying
    # the `agent-ready` label, so this generic @claude bot skips those. The loop, in
    # turn, fires only on `agent-ready` / workflow_dispatch / schedule and never on a
    # bare @claude mention — so the two never act on the same issue at the same time.
    # (A loop-opened PR is not labeled `agent-ready`, so @claude still works there.)
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.issue.labels.*.name, 'agent-ready')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.pull_request.labels.*.name, 'agent-ready')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && !contains(github.event.pull_request.labels.*.name, 'agent-ready')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && !contains(github.event.issue.labels.*.name, 'agent-ready'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # v1 has no `model:` / `effort:` inputs — both are forwarded to the
          # Claude CLI via `claude_args`. Pin Opus 4.8 and set xhigh effort
          # (ultracode's effort level) as a dependable baseline.
          claude_args: "--model claude-opus-4-8 --effort xhigh"
          # "ultracode" (xhigh effort + dynamic workflow orchestration) is a
          # Claude Code setting, not an action input; request it via settings.
          settings: |
            {"ultracode": true}
